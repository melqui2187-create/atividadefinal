<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Produtos de Informática</title>
    <link rel="stylesheet" href="style-logo.css">
    <script src="main.js" defer></script>
    <link rel="icon" type="image/x-icon" href="imgs/logo.png" sizes="500x350">
</head>

<body>
    <!-- HEADER: Cabeçalho semântico que contém o elemento principal da página -->
    <header>
        <img src="imgs/logo.png" alt="Logo da empresa" width="100" height="100">
        <h1>Catálogo de Produtos</h1>
        <p>Navegue e consulte nossos produtos de informática</p>
    </header>

    <!-- MAIN: Elemento semântico que define o conteúdo principal da página -->
    <main>
        <!-- SECTION: Agrupa o formulário de busca e produtos relacionados -->
        <section id="secao-produtos">
            <h2>Buscar Produtos</h2>

            <!-- FORM: Elemento semântico para formulários, melhorando acessibilidade -->
            <form id="formulario-pesquisa">
                <!-- FIELDSET e LEGEND: Agrupam elementos de formulário com descrição semântica -->
                <fieldset>
                    <legend>Selecione um produto</legend>

                    <!-- LABEL: Associa texto descritivo ao select para melhor acessibilidade -->
                    <label for="pro1">Escolha o produto:</label>

                    <!-- SELECT: Lista de opções disponíveis -->
                    <select id="pro1" aria-label="Seleção de produtos">
                        <option value="1">Mouse</option>
                        <option value="2">Teclado</option>
                        <option value="3">Cabo USB</option>
                        <option value="4">Monitor</option>
                        <option value="5">Antivírus</option>
                        <option value="6">Cabo HDMI</option>
                        <option value="7">Placa de Vídeo</option>
                        <option value="8">Processador</option>
                        <option value="9">Memória RAM</option>
                        <option value="10">Placa Mãe</option>
                        <option value="11">HD/SSD</option>
                        <option value="12">Fonte de Alimentação</option>
                    </select>
                </fieldset>

                <!-- DIV: Agrupa os botões de ação semanticamente -->
                <div class="grupo-botoes">
                    <!-- BUTTON: Botão semântico com tipo específico -->
                    <button type="button" onclick="verProduto()" class="btn-primario">Ver Produto</button>

                    <!-- BUTTON: Botão para limpar a busca -->
                    <button type="button" onclick="limparLista()" class="btn-secundario">Limpar Lista</button>
                </div>
            </form>
        </section>

        <!-- SECTION: Agrupa os resultados da busca de forma semântica -->
        <section id="secao-resultados">
            <h2>Resultados</h2>

            <!-- DIV com role: Exibe os produtos encontrados -->
            <!-- aria-live: Notifica leitores de tela sobre atualizações de conteúdo -->
            <div id="resultado" role="region" aria-live="polite" aria-label="Resultados dos produtos">
                <!-- Os resultados serão inseridos aqui dinamicamente pelo JavaScript -->
            </div>
        </section>
    </main>

    <!-- FOOTER: Rodapé semântico da página -->
    <footer>
        <p>&copy; 2026 - Catálogo de Produtos. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
